<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#13110E"/>
            <stop offset="100%" stop-color="#1E1A16"/>
        </linearGradient>
        <radialGradient id="glow" cx="80%" cy="20%" r="60%">
            <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.18"/>
            <stop offset="60%" stop-color="#C9A84C" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="1200" height="630" fill="url(#bg)"/>
    <rect width="1200" height="630" fill="url(#glow)"/>
    <rect x="0" y="0" width="12" height="630" fill="#C9A84C"/>

    <!-- Brand -->
    <text x="64" y="120" font-family="Syne, sans-serif" font-weight="800" font-size="22" letter-spacing="6" fill="#C9A84C">FINEPRINT</text>
    <text x="64" y="148" font-family="Syne, sans-serif" font-weight="700" font-size="13" letter-spacing="5" fill="#8C7B6B">Contract Reader</text>

    <!-- Headline -->
    <text x="64" y="290" font-family="Playfair Display, Georgia, serif" font-weight="900" font-size="74" fill="#F7F3EC">Know what you're</text>
    <text x="64" y="378" font-family="Playfair Display, Georgia, serif" font-weight="900" font-size="74" fill="#F7F3EC">signing before</text>
    <text x="64" y="466" font-family="Playfair Display, Georgia, serif" font-weight="900" font-size="74" font-style="italic" fill="#C9A84C">you sign.</text>

    <!-- Subhead -->
    <text x="64" y="540" font-family="DM Mono, monospace" font-weight="400" font-size="22" fill="#8C7B6B">Free AI real-estate contract analysis · 90 seconds · Open source</text>

    <!-- Badges row -->
    <g transform="translate(64, 580)">
        <rect x="0" y="0" width="220" height="32" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
        <text x="110" y="22" font-family="Syne, sans-serif" font-weight="800" font-size="12" letter-spacing="3" fill="#C9A84C" text-anchor="middle">MIT LICENSED · GITHUB</text>
    </g>

    <!-- Terminal card top-right -->
    <g transform="translate(720, 180)">
        <rect width="420" height="340" fill="#0A0907" stroke="#C9A84C" stroke-opacity="0.25"/>
        <rect width="420" height="32" fill="#1A1714"/>
        <circle cx="18" cy="16" r="5" fill="#B5451B"/>
        <circle cx="36" cy="16" r="5" fill="#D4841A"/>
        <circle cx="54" cy="16" r="5" fill="#1E7A4A"/>
        <text x="76" y="20" font-family="Syne, sans-serif" font-weight="700" font-size="9" letter-spacing="3" fill="#8C7B6B">FINEPRINT · LIVE DEMO</text>

        <text x="24" y="74" font-family="DM Mono, monospace" font-size="14" fill="#C9A84C">$ fineprint analyze contract.pdf</text>
        <text x="24" y="100" font-family="DM Mono, monospace" font-size="13" fill="#8C7B6B">» extracting 47 clauses ......</text>
        <text x="24" y="124" font-family="DM Mono, monospace" font-size="13" fill="#8C7B6B">» scoring risk ...............</text>
        <text x="24" y="148" font-family="DM Mono, monospace" font-size="13" fill="#8C7B6B">» translating ................</text>

        <text x="24" y="190" font-family="DM Mono, monospace" font-size="15" fill="#D4841A">── RISK SCORE: 7.4 / 10 ──</text>

        <text x="24" y="224" font-family="DM Mono, monospace" font-size="13" fill="#C0392B">● CRITICAL  Earnest money</text>
        <text x="24" y="246" font-family="DM Mono, monospace" font-size="13" fill="#B5451B">● HIGH      Inspection 5 days</text>
        <text x="24" y="268" font-family="DM Mono, monospace" font-size="13" fill="#D4841A">● MEDIUM    HOA late delivery</text>

        <text x="24" y="306" font-family="DM Mono, monospace" font-size="13" fill="#1E7A4A">VERDICT  Negotiate before signing.</text>
    </g>
</svg>
